# Nginx Version
version: '3.9'

services:

  backend:
    build:
      context: ./localcuisine
      dockerfile: Dockerfile
    container_name: localcuisine-backend
    expose:
      - "8080"
    depends_on:
      - redis
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  redis:
    image: redis:8-alpine
    container_name: localcuisine-redis
    expose:
      - "6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-next
    expose:
      - "3000"
    depends_on:
      - backend


